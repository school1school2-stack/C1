<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأرشيف الشهري لتقارير المدارس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .month-header { background: linear-gradient(90deg, #1e40af 0%, #3b82f6 100%); }
        .report-card { transition: all 0.3s ease; border-right: 5px solid #3b82f6; }
        .report-card:hover { transform: scale(1.02); shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="container mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm">
            <div>
                <h1 class="text-3xl font-black text-blue-900">الأرشيف الزمني للتقارير</h1>
                <p class="text-gray-500">استطلاع أعمال الـ 300 مدرسة مصنفة شهرياً</p>
            </div>
            <div class="text-left">
                <span class="block text-sm text-gray-400">تحديث تلقائي</span>
                <span class="font-bold text-green-600"><i class="fas fa-sync-alt fa-spin ml-1"></i> متصل الآن</span>
            </div>
        </header>

        <div class="mb-12">
            <div class="month-header text-white px-8 py-3 rounded-2xl shadow-lg mb-6 flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fas fa-calendar-alt ml-2"></i> تقارير شهر أبريل 2026</h2>
                <span class="bg-white/20 px-4 py-1 rounded-full text-sm">124 تقرير</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm report-card">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-bold text-blue-800 text-lg">ابتدائية الفيفا الأولى</h3>
                        <span class="text-xs text-gray-400 italic">07 أبريل</span>
                    </div>
                    <div class="text-sm text-gray-600 space-y-1 mb-4">
                        <p><i class="fas fa-bullhorn ml-2 text-blue-400"></i><b>الفرصة:</b> حملة تنظيف البيئة</p>
                        <p><i class="fas fa-users ml-2 text-blue-400"></i><b>الطلاب:</b> 45 مشارك</p>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <div class="w-12 h-12 bg-gray-200 rounded-lg overflow-hidden"><img src="https://via.placeholder.com/50" alt="صورة"></div>
                        <div class="w-12 h-12 bg-gray-200 rounded-lg overflow-hidden"><img src="https://via.placeholder.com/50" alt="صورة"></div>
                        <div class="w-12 h-12 bg-gray-200 rounded-lg overflow-hidden"><img src="https://via.placeholder.com/50" alt="صورة"></div>
                    </div>
                    <button class="w-full py-2 bg-blue-50 text-blue-600 rounded-xl font-bold text-sm hover:bg-blue-600 hover:text-white transition">عرض كامل التفاصيل</button>
                </div>
            </div>
        </div>

        <div class="mb-12 opacity-80">
            <div class="bg-gray-700 text-white px-8 py-3 rounded-2xl shadow-lg mb-6 flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fas fa-history ml-2"></i> أرشيف شهر مارس 2026</h2>
                <span class="bg-white/20 px-4 py-1 rounded-full text-sm">300 تقرير (مكتمل)</span>
            </div>
            </div>

    </div>

</body>
</html>
