<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة استطلاع أعمال المدارس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; background-color: #111827; } </style>
</head>
<body class="text-gray-100 p-6">
    <div class="container mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-700 pb-5">
            <div>
                <h1 class="text-3xl font-black text-blue-400">لوحة المراقبة المركزية</h1>
                <p class="text-gray-400">استطلاع أعمال الـ 300 مدرسة</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
                <span class="text-sm text-gray-400">إجمالي التقارير:</span>
                <span class="text-2xl font-bold text-green-400 ml-2">300</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 hover:border-blue-500 transition">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-xl font-bold text-white">ابتدائية الفيفا الأولى</h3>
                    <span class="text-xs bg-blue-900 text-blue-200 px-2 py-1 rounded">منذ ساعة</span>
                </div>
                <p class="text-gray-400 text-sm mb-4 leading-relaxed">
                    تم إنجاز ربط الحروف العربية لطلاب الصف الأول، وإعداد ملفات المتابعة الأسبوعية.
                </p>
                <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-700">
                    <span class="text-xs text-gray-500 italic">المنسق: عبدالعزيز</span>
                    <button class="text-blue-400 hover:underline text-sm font-bold">فتح التقرير</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
