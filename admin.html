<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المركزية - الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .sidebar { background: #1e293b; color: white; transition: all 0.3s; }
        .hidden { display: none; }
        .card-school { transition: transform 0.2s; cursor: pointer; }
        .card-school:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-64 p-6 hidden md:block">
        <h2 class="text-2xl font-black mb-10 text-blue-400 text-center">التحكم العام</h2>
        <nav class="space-y-4">
            <button onclick="showSection('admin-summary')" class="w-full text-right p-3 hover:bg-slate-700 rounded-xl transition flex items-center gap-3">
                <i class="fas fa-th-large"></i> ملخص الإحصائيات
            </button>
            <button onclick="showSection('add-supervisors')" class="w-full text-right p-3 hover:bg-slate-700 rounded-xl transition flex items-center gap-3">
                <i class="fas fa-user-shield"></i> إضافة مشرفين
            </button>
            <button onclick="showSection('schools-list')" class="w-full text-right p-3 hover:bg-slate-700 rounded-xl transition flex items-center gap-3">
                <i class="fas fa-school"></i> قائمة المدارس
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        
        <section id="admin-summary" class="animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-white font-bold">
                <div class="bg-blue-600 p-6 rounded-3xl shadow-lg">إجمالي المدارس: 300</div>
                <div class="bg-emerald-500 p-6 rounded-3xl shadow-lg">تقارير هذا الشهر: 145</div>
                <div class="bg-orange-500 p-6 rounded-3xl shadow-lg">المشرفين: 5</div>
            </div>
        </section>

        <section id="add-supervisors" class="hidden max-w-lg bg-white p-8 rounded-[2.5rem] shadow-xl border">
            <h3 class="text-xl font-black mb-6 border-r-4 border-blue-600 pr-3">إضافة مشرف جديد للوحة</h3>
            <form class="space-y-4">
                <input type="text" placeholder="اسم المشرف الثلاثي" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="tel" placeholder="رقم الجوال" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">اعتماد المشرف</button>
            </form>
        </section>

        <section id="schools-list" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h3 class="text-2xl font-black">إدارة المدارس والتقارير</h3>
                <div class="relative w-full md:w-96">
                    <i class="fas fa-search absolute right-4 top-4 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="searchSchools()" placeholder="ابحث باسم المدرسة أو الرقم الوزاري..." class="w-full pr-12 p-4 bg-white border rounded-full shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div id="schoolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div onclick="viewSchoolReports('ابتدائية الفيفا')" class="card-school bg-white p-6 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center text-blue-600">
                        <i class="fas fa-school text-2xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-lg school-name">ابتدائية الفيفا الأولى</h4>
                        <p class="text-xs text-gray-400">الرقم الوزاري: 12345</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="school-detail-view" class="hidden">
            <button onclick="showSection('schools-list')" class="mb-6 text-blue-600 font-bold"><i class="fas fa-arrow-right ml-2"></i> العودة لقائمة المدارس</button>
            <h3 id="targetSchoolName" class="text-2xl font-black mb-8 text-blue-900 italic">تقارير مدرسة: ---</h3>
            
            <div class="space-y-6">
                <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div class="bg-gray-50 p-4 font-bold border-b flex justify-between items-center">
                        <span>أبريل 2026</span>
                        <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs">3 تقارير</span>
                    </div>
                    <div class="p-6 grid gap-4">
                        <div class="p-4 bg-slate-50 rounded-xl border-r-4 border-emerald-500">
                            <p class="font-bold text-sm">اسم الفرصة: تشجير الساحة</p>
                            <p class="text-xs text-gray-400 mt-1">تاريخ الرفع: 07/04/2026</p>
                            <button class="mt-2 text-blue-600 text-xs font-bold underline">عرض الصور والبيانات</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // دالة التنقل بين الأقسام
        function showSection(id) {
            const sections = ['admin-summary', 'add-supervisors', 'schools-list', 'school-detail-view'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // دالة البحث
        function searchSchools() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card-school');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector('.school-name').innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "flex" : "none";
            }
        }

        // دالة عرض تقارير مدرسة
        function viewSchoolReports(name) {
            document.getElementById('targetSchoolName').innerText = `تقارير مدرسة: ${name}`;
            showSection('school-detail-view');
        }

        // إظهار القسم الأول عند التشغيل
        showSection('admin-summary');
    </script>
</body>
</html>
