<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تقارير المدارس الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; }
        .card-anim { transition: all 0.3s ease; }
        .card-anim:hover { transform: translateY(-5px); }
        .hidden { display: none; }
        .gradient-primary { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="gradient-primary text-white shadow-xl p-5 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                <i class="fas fa-chart-line text-yellow-300"></i>
                نظام المتابعة الذكي
            </h1>
            <button onclick="toggleAdmin()" class="bg-white/20 hover:bg-white/40 px-5 py-2 rounded-full text-sm transition">
                <i class="fas fa-lock-open ml-1"></i> لوحة الإدارة
            </button>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        
        <div id="main-school-ui" class="max-w-3xl mx-auto space-y-6">
            
            <div id="step1" class="bg-white p-8 rounded-3xl shadow-lg border-b-4 border-blue-600 card-anim text-center">
                <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-school text-3xl text-blue-600"></i>
                </div>
                <h2 class="text-xl font-bold mb-6">مرحباً بك، ابدأ بتسجيل بيانات مدرستك</h2>
                <button onclick="showSchoolForm()" id="btn-add-school" class="gradient-primary text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-2xl transition-all">
                    <i class="fas fa-plus-circle ml-2"></i> إضافة مدرستي
                </button>

                <div id="school-form" class="hidden mt-8 text-right space-y-4 border-t pt-6 animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="schoolName" placeholder="اسم المدرسة" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="coordinator" placeholder="اسم المنسق" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <input type="tel" id="phone" placeholder="رقم الجوال" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="saveSchoolInfo()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-2xl transition">حفظ البيانات</button>
                </div>
            </div>

            <div id="step2" class="hidden bg-white p-8 rounded-3xl shadow-lg border-b-4 border-yellow-500 card-anim text-center">
                <div class="bg-yellow-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-clipboard-list text-3xl text-yellow-600"></i>
                </div>
                <h2 id="welcome-msg" class="text-xl font-bold mb-6 italic text-blue-800"></h2>
                <button onclick="showReportForm()" id="btn-add-report" class="bg-yellow-500 hover:bg-yellow-600 text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-lg transition-all">
                    <i class="fas fa-file-signature ml-2"></i> إضافة تقرير عمل
                </button>

                <div id="report-form" class="hidden mt-8 text-right space-y-4 border-t pt-6">
                    <label class="font-bold text-gray-600">تفاصيل الإنجاز:</label>
                    <textarea id="reportContent" rows="5" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500" placeholder="ما هي الأعمال التي تم إنجازها اليوم؟"></textarea>
                    <button onclick="submitFinalReport()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-2xl transition shadow-lg">إرسال التقرير للإدارة</button>
                </div>
            </div>

        </div>

        <section id="admin-panel" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-gray-800 underline decoration-blue-500">لوحة استطلاع الأعمال</h2>
                <button onclick="toggleAdmin()" class="text-red-500 font-bold">إغلاق <i class="fas fa-times"></i></button>
            </div>
            <div id="reports-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

    </main>

    <script>
        let currentSchool = {};
        let allReports = [];

        // إظهار نموذج المدرسة
        function showSchoolForm() {
            document.getElementById('school-form').classList.remove('hidden');
            document.getElementById('btn-add-school').classList.add('hidden');
        }

        // حفظ بيانات المدرسة والانتقال لخطوة التقرير
        function saveSchoolInfo() {
            const name = document.getElementById('schoolName').value;
            const coord = document.getElementById('coordinator').value;
            const phone = document.getElementById('phone').value;

            if(!name || !coord || !phone) {
                alert("يرجى تعبئة كافة بيانات المدرسة أولاً");
                return;
            }

            currentSchool = { name, coord, phone };
            
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `مرحباً بمدرسة: ${name}`;
        }

        // إظهار نموذج التقرير
        function showReportForm() {
            document.getElementById('report-form').classList.remove('hidden');
            document.getElementById('btn-add-report').classList.add('hidden');
        }

        // إرسال التقرير النهائي
        function submitFinalReport() {
            const content = document.getElementById('reportContent').value;
            if(!content) {
                alert("لا يمكن إرسال تقرير فارغ");
                return;
            }

            const fullReport = {
                ...currentSchool,
                content: content,
                time: new Date().toLocaleString('ar-SA')
            };

            allReports.unshift(fullReport);
            renderAdminCards();
            
            alert("تم إرسال تقريرك بنجاح للمشرف");
            
            // إعادة الواجهة للوضع الأصلي
            document.getElementById('report-form').classList.add('hidden');
            document.getElementById('btn-add-report').classList.remove('hidden');
            document.getElementById('reportContent').value = '';
        }

        // بناء بطاقات التقارير في لوحة الإدارة
        function renderAdminCards() {
            const container = document.getElementById('reports-container');
            container.innerHTML = '';

            allReports.forEach(r => {
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-md border-r-8 border-blue-500 relative overflow-hidden">
                        <div class="absolute top-0 left-0 bg-blue-100 px-3 py-1 rounded-br-xl text-xs font-bold text-blue-600 underline">${r.time}</div>
                        <h3 class="text-xl font-bold text-blue-900 mt-4 mb-2">${r.name}</h3>
                        <p class="text-sm text-gray-500 mb-4"><i class="fas fa-user ml-1"></i> المنسق: ${r.coord}</p>
                        <div class="bg-gray-50 p-4 rounded-xl text-sm leading-relaxed border italic text-gray-700">
                            ${r.content}
                        </div>
                        <div class="mt-4 flex justify-between items-center">
                            <a href="tel:${r.phone}" class="text-green-600 text-sm font-bold"><i class="fas fa-phone"></i> اتصل بالمنسق</a>
                            <i class="fas fa-check-double text-blue-300 text-2xl"></i>
                        </div>
                    </div>
                `;
            });
        }

        // تبديل العرض بين واجهة المدرسة ولوحة الإدارة
        function toggleAdmin() {
            document.getElementById('main-school-ui').classList.toggle('hidden');
            document.getElementById('admin-panel').classList.toggle('hidden');
        }
    </script>
</body>
</html>
