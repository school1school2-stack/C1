<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال تقرير المدرسة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border-t-8 border-blue-600">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-paper-plane text-2xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">نظام رفع التقارير</h1>
            <p class="text-sm text-gray-500">الرجاء تعبئة البيانات بدقة</p>
        </div>

        <form class="space-y-4">
            <div id="school-info">
                <button type="button" onclick="this.nextElementSibling.classList.toggle('hidden'); this.classList.add('hidden')" class="w-full bg-blue-50 text-blue-700 py-3 rounded-xl font-bold border-2 border-dashed border-blue-200">
                    <i class="fas fa-school ml-2"></i> إضافة بيانات مدرستي
                </button>
                <div class="hidden space-y-3 animate-fade-in">
                    <input type="text" placeholder="اسم المدرسة" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <input type="text" placeholder="اسم المنسق" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <input type="tel" placeholder="رقم الجوال" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>
            </div>

            <div class="border-t pt-4">
                <label class="block mb-2 font-bold text-gray-700">تقرير العمل:</label>
                <textarea rows="5" placeholder="اكتب ملخص الإنجازات هنا..." class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition transform hover:scale-[1.02]">
                حفظ وإرسال التقرير
            </button>
        </form>
    </div>
</body>
</html>
