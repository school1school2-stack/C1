<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التقارير المدرسية الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .input-group { @apply space-y-2 mb-4; }
        .input-control { @apply w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-300; }
        .btn-action { @apply flex items-center justify-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all duration-300 transform active:scale-95; }
        .hidden { display: none; }
        .animate-slide { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-layer-group"></i>
                </div>
                <h1 class="font-black text-xl tracking-tight hidden md:block">منصة إدارة التقارير</h1>
            </div>
            <div id="school-info-tag" class="hidden bg-emerald-50 text-emerald-700 px-4 py-2 rounded-full text-xs font-bold border border-emerald-100">
                <i class="fas fa-school ml-1"></i> مدرسة: <span id="display-school-name">---</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-10">

        <section id="welcome-view" class="text-center py-20 animate-slide">
            <div class="bg-white p-12 rounded-[3rem] shadow-xl border border-gray-50">
                <i class="fas fa-user-gear text-6xl text-blue-100 mb-6"></i>
                <h2 class="text-3xl font-black mb-4 text-slate-900">مرحباً بك في النظام الجديد</h2>
                <p class="text-slate-500 mb-10 max-w-sm mx-auto">للبدء في رفع التقارير، يرجى تعبئة بيانات الإعدادات الخاصة بمدرستكم أولاً.</p>
                <button onclick="toggleView('settings-view')" class="btn-action bg-blue-600 text-white shadow-lg shadow-blue-200 mx-auto w-full md:w-auto">
                    <i class="fas fa-cog"></i> ضبط الإعدادات
                </button>
            </div>
        </section>

        <div id="dashboard-controls" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 hidden animate-slide">
            <button onclick="toggleView('settings-view')" class="btn-action bg-white border border-gray-100 shadow-sm hover:shadow-md text-slate-600">
                <i class="fas fa-sliders-h text-blue-500"></i> تعديل الإعدادات
            </button>
            <button onclick="toggleView('report-view')" class="btn-action bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700">
                <i class="fas fa-plus-circle"></i> إضافة تقرير جديد
            </button>
            <button onclick="scrollToArchive()" class="btn-action bg-white border border-gray-100 shadow-sm hover:shadow-md text-slate-600">
                <i class="fas fa-archive text-emerald-500"></i> أرشيف التقارير
            </button>
        </div>

        <section id="settings-view" class="hidden animate-slide">
            <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-blue-50">
                <h3 class="text-2xl font-black mb-8 border-r-4 border-blue-600 pr-4">إعدادات المدرسة</h3>
                <form id="settingsForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="input-group md:col-span-1"><label class="text-xs font-bold text-gray-400">اسم المدرسة</label><input type="text" id="s_name" required class="input-control"></div>
                    <div class="input-group md:col-span-1"><label class="text-xs font-bold text-gray-400">الحي</label><input type="text" id="s_district" required class="input-control"></div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">الرقم الوزاري</label><input type="number" id="s_code" required class="input-control"></div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">اسم مدير المدرسة</label><input type="text" id="s_manager" required class="input-control"></div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">جوال مدير المدرسة</label><input type="tel" id="s_m_phone" required class="input-control" placeholder="05XXXXXXXX"></div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">اسم منسق التطوع</label><input type="text" id="s_coord" required class="input-control"></div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">جوال منسق التطوع</label><input type="tel" id="s_c_phone" required class="input-control"></div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">الإيميل</label><input type="email" id="s_email" required class="input-control"></div>
                    <div class="md:col-span-2 pt-6">
                        <button type="submit" class="w-full btn-action bg-blue-600 text-white py-5 shadow-xl">حفظ البيانات <i class="fas fa-check"></i></button>
                    </div>
                </form>
            </div>
        </section>

        <section id="report-view" class="hidden animate-slide">
            <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-blue-50">
                <h3 class="text-2xl font-black mb-8 border-r-4 border-emerald-500 pr-4">إضافة تقرير فرصة تطوعية</h3>
                <form id="reportForm" class="space-y-4">
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">اسم الفرصة التطوعية</label><input type="text" id="r_title" required class="input-control" placeholder="مثال: تشجير حديقة المدرسة"></div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="input-group"><label class="text-xs font-bold text-gray-400">مكان التنفيذ</label><input type="text" id="r_place" required class="input-control"></div>
                        <div class="input-group"><label class="text-xs font-bold text-gray-400">عدد الطلاب</label><input type="number" id="r_count" required class="input-control"></div>
                        <div class="input-group"><label class="text-xs font-bold text-gray-400">المشرف</label><input type="text" id="r_supervisor" required class="input-control"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group"><label class="text-xs font-bold text-gray-400">من تاريخ</label><input type="date" id="r_date_start" required class="input-control"></div>
                        <div class="input-group"><label class="text-xs font-bold text-gray-400">إلى تاريخ</label><input type="date" id="r_date_end" required class="input-control"></div>
                    </div>
                    <div class="input-group">
                        <label class="text-xs font-bold text-gray-400">صور التوثيق (3 صور)</label>
                        <div class="border-2 border-dashed border-blue-100 bg-blue-50/30 rounded-2xl p-8 text-center relative hover:bg-blue-50 transition-all cursor-pointer">
                            <input type="file" id="r_photos" accept="image/*" multiple required class="absolute inset-0 opacity-0 cursor-pointer">
                            <i class="fas fa-images text-3xl text-blue-300 mb-3 block"></i>
                            <p class="text-sm font-bold text-blue-700">ارفع الصور من الاستديو</p>
                        </div>
                    </div>
                    <div class="input-group"><label class="text-xs font-bold text-gray-400">التفاصيل</label><textarea id="r_details" rows="4" required class="input-control"></textarea></div>
                    <div class="flex gap-4 pt-6">
                        <button type="submit" class="flex-1 btn-action bg-emerald-600 text-white py-5 shadow-lg shadow-emerald-100">إرسال وحفظ التقرير <i class="fas fa-paper-plane"></i></button>
                        <button type="button" onclick="toggleView('dashboard-controls')" class="px-8 btn-action bg-gray-100 text-gray-500 hover:bg-gray-200">إلغاء</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="archive-section" class="hidden mt-12 animate-slide">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-black text-slate-800 border-r-4 border-slate-300 pr-4">الأرشيف الزمني</h3>
                <span class="text-xs font-bold bg-slate-200 px-3 py-1 rounded-full">300 مدرسة</span>
            </div>
            <div id="reports-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                </div>
        </section>

    </main>

    <script>
        // دالة التنقل بين الواجهات
        function toggleView(viewId) {
            const views = ['welcome-view', 'settings-view', 'report-view', 'archive-section'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            
            if (viewId === 'dashboard-controls') {
                document.getElementById('dashboard-controls').classList.remove('hidden');
                document.getElementById('archive-section').classList.remove('hidden');
            } else {
                document.getElementById(viewId).classList.remove('hidden');
                if (viewId !== 'welcome-view') document.getElementById('dashboard-controls').classList.remove('hidden');
            }
        }

        // عند تحميل الصفحة: استعادة البيانات لمنع الاختفاء
        window.onload = function() {
            const savedSchool = localStorage.getItem('schoolData');
            if (savedSchool) {
                const data = JSON.parse(savedSchool);
                document.getElementById('display-school-name').innerText = data.name;
                document.getElementById('school-info-tag').classList.remove('hidden');
                toggleView('dashboard-controls');
                loadSavedReports();
            }
        };

        // حفظ الإعدادات
        document.getElementById('settingsForm').onsubmit = function(e) {
            e.preventDefault();
            const schoolData = { name: document.getElementById('s_name').value, code: document.getElementById('s_code').value };
            localStorage.setItem('schoolData', JSON.stringify(schoolData));
            
            Swal.fire({ title: 'تم الحفظ!', text: 'تم تحديث بيانات المدرسة بنجاح', icon: 'success', confirmButtonColor: '#2563eb' });
            location.reload();
        };

        // إرسال التقرير
        document.getElementById('reportForm').onsubmit = function(e) {
            e.preventDefault();
            const report = {
                id: Date.now(),
                title: document.getElementById('r_title').value,
                date: new Date().toLocaleDateString('ar-SA'),
                month: new Date().toLocaleString('ar-SA', { month: 'long', year: 'numeric' })
            };

            const reports = JSON.parse(localStorage.getItem('reportsList') || '[]');
            reports.unshift(report);
            localStorage.setItem('reportsList', JSON.stringify(reports));

            Swal.fire({ title: 'تم الإرسال!', text: 'تمت أرشفة تقريرك بنجاح في السحابة', icon: 'success' });
            document.getElementById('reportForm').reset();
            location.reload();
        };

        function loadSavedReports() {
            const reports = JSON.parse(localStorage.getItem('reportsList') || '[]');
            const grid = document.getElementById('reports-grid');
            grid.innerHTML = '';

            reports.forEach(r => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border-r-8 border-blue-500 shadow-sm hover:shadow-xl transition-all group animate-slide">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${r.month}</span>
                                <h4 class="font-black text-lg text-slate-800 mt-1">${r.title}</h4>
                            </div>
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition duration-300">
                                <button onclick="deleteReport(${r.id})" class="w-10 h-10 bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash text-xs"></i></button>
                                <button class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full hover:bg-blue-500 hover:text-white transition"><i class="fas fa-pen text-xs"></i></button>
                            </div>
                        </div>
                        <div class="flex gap-2 mb-4 overflow-hidden rounded-xl">
                            <div class="w-full h-12 bg-slate-100 rounded-lg"></div>
                            <div class="w-full h-12 bg-slate-100 rounded-lg"></div>
                            <div class="w-full h-12 bg-slate-100 rounded-lg"></div>
                        </div>
                        <div class="flex justify-between items-center text-[11px] font-bold border-t pt-4 text-slate-400 italic">
                            <span><i class="far fa-calendar-check ml-1"></i> ${r.date}</span>
                            <span class="text-emerald-500"><i class="fas fa-cloud-upload-alt ml-1"></i> محفوظ سحابياً</span>
                        </div>
                    </div>
                `;
            });
        }

        function deleteReport(id) {
            Swal.fire({
                title: 'حذف التقرير؟',
                text: "لا يمكن التراجع عن هذه العملية من السحابة!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، احذف',
                cancelButtonText: 'إلغاء'
            }).then((res) => {
                if (res.isConfirmed) {
                    let reports = JSON.parse(localStorage.getItem('reportsList') || '[]');
                    reports = reports.filter(r => r.id !== id);
                    localStorage.setItem('reportsList', JSON.stringify(reports));
                    location.reload();
                }
            });
        }

        function scrollToArchive() {
            document.getElementById('archive-section').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
