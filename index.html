<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المدارس - الإعدادات والتقارير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7fe; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; }
        .input-style { @apply w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-blue-600 p-8 text-white text-center">
            <h1 class="text-2xl font-black mb-2">منصة العمل التطوعي المدرسي</h1>
            <p class="opacity-80 text-sm">نظام إدارة ورفع التقارير الميدانية</p>
        </div>

        <div class="flex border-b text-center font-bold">
            <button onclick="switchTab('settings')" id="btn-settings" class="flex-1 py-4 tab-active transition-all">
                <i class="fas fa-cog ml-2"></i> الإعدادات
            </button>
            <button onclick="switchTab('reports')" id="btn-reports" class="flex-1 py-4 text-gray-400 transition-all">
                <i class="fas fa-file-medical ml-2"></i> إضافة تقرير
            </button>
        </div>

        <div class="p-6 md:p-10">
            <form id="settingsForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">اسم المدرسة *</label>
                        <input type="text" required class="input-style" placeholder="مثال: ابتدائية الفيفا">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">الحي *</label>
                        <input type="text" required class="input-style" placeholder="اسم الحي">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">الرقم الوزاري *</label>
                        <input type="number" required class="input-style" placeholder="00000">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">اسم مدير المدرسة *</label>
                        <input type="text" required class="input-style">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">جوال المدير *</label>
                        <input type="tel" required class="input-style" placeholder="05xxxxxxxx">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">اسم منسق التطوع *</label>
                        <input type="text" required class="input-style">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">جوال المنسق *</label>
                        <input type="tel" required class="input-style">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">الإيميل الرسمي *</label>
                        <input type="email" required class="input-style" placeholder="school@mail.com">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg mt-6 transition">
                    <i class="fas fa-save ml-2"></i> حفظ بيانات المدرسة
                </button>
            </form>

            <form id="reportsForm" class="hidden space-y-4">
                <div>
                    <label class="block mb-1 text-sm font-bold text-gray-600">اسم الفرصة التطوعية *</label>
                    <input type="text" required class="input-style" placeholder="مثال: تشجير محيط المدرسة">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">مكان التنفيذ *</label>
                        <input type="text" required class="input-style">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">عدد الطلاب المشاركين *</label>
                        <input type="number" required class="input-style">
                    </div>
                </div>
                <div>
                    <label class="block mb-1 text-sm font-bold text-gray-600">المشرف المسؤول *</label>
                    <input type="text" required class="input-style">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">التاريخ من *</label>
                        <input type="date" required class="input-style">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-bold text-gray-600">التاريخ إلى *</label>
                        <input type="date" required class="input-style">
                    </div>
                </div>

                <div>
                    <label class="block mb-1 text-sm font-bold text-gray-600 text-blue-600">رفع صور التوثيق (3 صور) *</label>
                    <div class="border-2 border-dashed border-blue-200 rounded-2xl p-4 bg-blue-50 text-center">
                        <input type="file" id="photos" accept="image/*" multiple required class="hidden">
                        <label for="photos" class="cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-3xl text-blue-400 mb-2"></i>
                            <p class="text-xs text-gray-500 font-bold">اضغط هنا لرفع الصور من الاستديو أو الكمبيوتر</p>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block mb-1 text-sm font-bold text-gray-600">تفاصيل التقرير *</label>
                    <textarea required rows="4" class="input-style" placeholder="وصف موجز لما تم إنجازه..."></textarea>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg mt-4 transition">
                    <i class="fas fa-paper-plane ml-2"></i> إرسال وحفظ التقرير
                </button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const settingsForm = document.getElementById('settingsForm');
            const reportsForm = document.getElementById('reportsForm');
            const btnSettings = document.getElementById('btn-settings');
            const btnReports = document.getElementById('btn-reports');

            if (tab === 'settings') {
                settingsForm.classList.remove('hidden');
                reportsForm.classList.add('hidden');
                btnSettings.classList.add('tab-active');
                btnReports.classList.remove('tab-active');
                btnReports.classList.add('text-gray-400');
            } else {
                settingsForm.classList.add('hidden');
                reportsForm.classList.remove('hidden');
                btnReports.classList.add('tab-active');
                btnReports.classList.remove('text-gray-400');
                btnSettings.classList.remove('tab-active');
                btnSettings.classList.add('text-gray-400');
            }
        }

        // منع الإرسال إذا كانت الحقول فارغة (تأكيد إضافي)
        document.querySelectorAll('form').forEach(form => {
            form.onsubmit = (e) => {
                e.preventDefault();
                const photos = document.getElementById('photos').files;
                if (form.id === 'reportsForm' && photos.length < 1) {
                    alert('يرجى اختيار صور التوثيق أولاً');
                    return;
                }
                alert('تم حفظ البيانات بنجاح وبانتظار المزامنة!');
                // هنا سيتم إضافة كود الربط بـ Firebase لاحقاً
            };
        });
    </script>
</body>
</html>
