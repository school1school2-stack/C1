<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المدارس - إرسال التقارير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
        .school-card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <nav class="bg-blue-700 text-white p-5 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-university ml-2"></i>منصة متابعة المدارس</h1>
            <button onclick="adminLogin()" class="text-blue-200 text-xs hover:text-white transition">دخول الإدارة</button>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        
        <section id="school-ui" class="max-w-2xl mx-auto">
            <div class="school-card p-8 text-center border-t-8 border-blue-600">
                <i class="fas fa-plus-circle text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-2xl font-bold mb-6">تسجيل مدرسة جديدة</h2>
                
                <div id="initial-actions">
                    <button onclick="openForm('school')" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition w-full">
                        <i class="fas fa-plus ml-2"></i> إضافة مدرستي
                    </button>
                </div>

                <div id="form-school" class="hidden mt-6 text-right space-y-4 animate-pulse-once">
                    <input type="text" id="s_name" placeholder="اسم المدرسة" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <input type="text" id="s_coord" placeholder="اسم المنسق" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <input type="tel" id="s_phone" placeholder="رقم الجوال" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <button onclick="confirmSchool()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">حفظ البيانات</button>
                </div>

                <div id="form-report" class="hidden mt-6 text-right space-y-4">
                    <div class="bg-blue-50 p-4 rounded-lg mb-4 text-blue-800 font-bold">مرحباً: <span id="display-school-name"></span></div>
                    <button onclick="openForm('report-fields')" id="btn-report-trigger" class="w-full bg-yellow-500 text-white py-4 rounded-xl font-bold shadow-md">
                        <i class="fas fa-file-alt ml-2"></i> إضافة تقرير عمل
                    </button>
                    
                    <div id="report-fields" class="hidden space-y-4 pt-4 border-t">
                        <textarea id="r_content" rows="5" placeholder="اكتب تفاصيل الإنجاز هنا..." class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 bg-gray-50"></textarea>
                        <button onclick="sendReport()" class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg">إرسال التقرير الآن</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="admin-panel" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-gray-800 italic underline">استطلاع أعمال الـ 300 مدرسة</h2>
                <button onclick="location.reload()" class="bg-gray-200 px-4 py-2 rounded-lg text-sm">خروج</button>
            </div>
            <div id="admin-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

    </main>

    <script>
        let db = []; // في الواقع ستحتاج Firebase لحفظ دائم

        function openForm(id) {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'school') document.getElementById('initial-actions').classList.add('hidden');
            if(id === 'report-fields') document.getElementById('btn-report-trigger').classList.add('hidden');
        }

        function confirmSchool() {
            const name = document.getElementById('s_name').value;
            if(!name) return alert("فضلاً ادخل اسم المدرسة");
            document.getElementById('form-school').classList.add('hidden');
            document.getElementById('form-report').classList.remove('hidden');
            document.getElementById('display-school-name').innerText = name;
        }

        function sendReport() {
            const report = {
                name: document.getElementById('s_name').value,
                coord: document.getElementById('s_coord').value,
                phone: document.getElementById('s_phone').value,
                content: document.getElementById('r_content').value,
                time: new Date().toLocaleString('ar-SA')
            };
            db.unshift(report);
            alert("تم إرسال التقرير بنجاح");
            location.reload(); // إعادة الصفحة للوضع الأصلي بعد الإرسال
        }

        // دالة الدخول السري للإدارة
        function adminLogin() {
            const pass = prompt("الرجاء إدخال كلمة مرور الإدارة للاطلاع على التقارير:");
            if (pass === "1234") { // يمكنك تغيير كلمة المرور هنا
                document.getElementById('school-ui').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminData();
            } else {
                alert("كلمة مرور خاطئة!");
            }
        }

        function loadAdminData() {
            const container = document.getElementById('admin-cards');
            container.innerHTML = db.length === 0 ? '<p class="text-gray-500">لا توجد تقارير حالياً</p>' : '';
            db.forEach(r => {
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow border-r-4 border-green-500">
                        <h4 class="font-bold text-lg text-blue-900">${r.name}</h4>
                        <p class="text-xs text-gray-400 mb-2">${r.time}</p>
                        <p class="text-sm text-gray-700 bg-gray-50 p-3 rounded-lg">${r.content}</p>
                        <hr class="my-3">
                        <div class="text-xs font-bold text-blue-600">المنسق: ${r.coord} | ${r.phone}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
